<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register</title>
  <link rel="stylesheet" href="shared.css" />
</head>
<body data-page="register">
  <div class="auth-shell">
    <section class="auth-panel">
      <div>
        <a class="brand-mark" href="index.html">Pulse</a>
        <span class="eyebrow">Create account</span>
        <h1>Start a small, intentional monitor workspace.</h1>
        <p class="muted-copy">Only the fields required by the expansion brief.</p>
      </div>

      <form id="register-form" class="form-stack" novalidate>
        <div class="field">
          <label for="register-name">Full name</label>
          <input id="register-name" name="name" type="text" placeholder="Mayank Sharma" />
        </div>
        <div class="field">
          <label for="register-email">Email</label>
          <input id="register-email" name="email" type="email" placeholder="you@company.com" />
        </div>
        <div class="field">
          <label for="register-password">Password</label>
          <input id="register-password" name="password" type="password" placeholder="At least 8 characters" />
        </div>
        <div class="field">
          <label for="register-confirm">Confirm password</label>
          <input id="register-confirm" name="confirm" type="password" placeholder="Repeat password" />
        </div>
        <div id="register-message" class="message" aria-live="polite"></div>
        <button class="button button-primary full-width" type="submit">Register</button>
      </form>

      <div class="auth-links">
        <a href="login.html">Back to login</a>
      </div>
    </section>
  </div>
  <script src="shared.js"></script>
</body>
</html>
