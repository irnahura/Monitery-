<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login</title>
  <link rel="stylesheet" href="shared.css" />
</head>
<body data-page="login">
  <div class="auth-shell">
    <section class="auth-panel">
      <div>
        <a class="brand-mark" href="index.html">Pulse</a>
        <span class="eyebrow">Welcome back</span>
        <h1>Sign in to your monitor workspace.</h1>
        <p class="muted-copy">Minimal auth chrome, direct validation, quiet visual weight.</p>
      </div>

      <form id="login-form" class="form-stack" novalidate>
        <div class="field">
          <label for="login-email">Email</label>
          <input id="login-email" name="email" type="email" placeholder="you@company.com" />
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <input id="login-password" name="password" type="password" placeholder="Enter password" />
        </div>
        <label class="check-row" for="remember-me">
          <input id="remember-me" name="remember" type="checkbox" />
          <span>Remember me</span>
        </label>
        <div id="login-message" class="message" aria-live="polite"></div>
        <button class="button button-primary full-width" type="submit">Login</button>
      </form>

      <div class="auth-links">
        <a href="register.html">Create account</a>
        <a href="#" aria-disabled="true">Forgot password</a>
      </div>
    </section>
  </div>
  <script src="shared.js"></script>
</body>
</html>
