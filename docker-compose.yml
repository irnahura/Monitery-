services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: peekaping
      POSTGRES_PASSWORD: peekaping
      POSTGRES_DB: peekaping
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peekaping -d peekaping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://peekaping:peekaping@postgres:5432/peekaping?sslmode=disable
      JWT_SECRET: replace-this-secret
      DEFAULT_REQUEST_TIMEOUT_SECONDS: "10"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres-data:
